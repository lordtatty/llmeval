# CI — runs on every push to main and on every pull request.
#
# Three modules live in this repo (workspace via go.work):
#   - .             — core llmeval + llmevaltest
#   - ./anthropic   — pre-wired judge for Anthropic Claude
#   - ./openai      — pre-wired judge for OpenAI GPT
#
# Each is tested independently. The test job also runs the build-tagged
# example evals from the root module.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test each module (race detector + coverage)
        run: |
          set -euo pipefail
          for dir in . anthropic openai; do
            echo "==> go test in $dir"
            (cd "$dir" && go test -race -coverprofile=coverage.out ./...)
          done

      - name: Test build-tagged example evals
        run: go test -tags=llmeval ./examples/...

      - name: Coverage must be 100% in every module
        run: |
          set -euo pipefail
          fail=0
          for dir in . anthropic openai; do
            # Inspect every file's per-function coverage in this module.
            # Anything under 100% (excluding examples/ and generated mocks/)
            # is a fail.
            gaps=$(cd "$dir" && go tool cover -func=coverage.out \
              | grep -E '^github\.com/lordtatty/llmeval' \
              | grep -v '/examples/' \
              | grep -v '/mocks/' \
              | grep -v '100\.0%') || true
            if [ -n "$gaps" ]; then
              echo "::error::$dir coverage dropped below 100%"
              echo "$gaps"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "All modules at 100% coverage"

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Each module needs its own action invocation because the v8 action
      # doesn't expose the binary on PATH for subsequent steps — it runs
      # internally per call.
      - name: Lint main module
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: .

      - name: Lint anthropic sub-module
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: anthropic

      - name: Lint openai sub-module
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: openai
